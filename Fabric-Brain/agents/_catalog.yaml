# Agent Catalog — Fabric-Brain
# 25 agents organized into 9 domains
# Part of Azure-Brain umbrella (see ../../README.md)
# Last updated: 2026-06-23

domains:

  01-platform:
    description: Workspace lifecycle, capacity, CI/CD, CLI, monitoring
    agents:
      - name: workspace-admin-agent
        purpose: Workspace CRUD, capacity assignment, RBAC, Git integration
      - name: cicd-fabric-agent
        purpose: Git integration, deployment pipelines, variable libraries, branching, environment promotion
      - name: fabric-cli-agent
        purpose: fab CLI, item management, OneLake file ops, CI/CD deploy, job execution
      - name: monitoring-agent
        purpose: Admin APIs, audit events, capacity monitoring, KQL operational dashboards, Spark/SQL operations triage (Spark Advisor, OOM/skew/spill, Livy session health, Warehouse query insights)
      - name: taskflow-agent
        purpose: Task Flow visual templates, task-to-item mapping, JSON import/export
      - name: extensibility-toolkit-agent
        purpose: Custom workloads, iFrame SDK, React components, Workload Hub publishing

  02-data-engineering:
    description: Lakehouse, pipelines, dataflows, warehouse, dimensional modeling
    agents:
      - name: orchestrator-agent
        purpose: Data Pipelines, scheduling, OneLake uploads, Copy Jobs, Spark notebooks
      - name: lakehouse-agent
        purpose: OneLake DFS, Delta tables, Spark, SQL Endpoint, Shortcuts, medallion architecture
      - name: dataflow-agent
        purpose: Dataflow Gen2, Power Query M, 100+ data sources, incremental refresh
      - name: warehouse-agent
        purpose: T-SQL Warehouse, COPY INTO, stored procedures, transactions, time travel
      - name: domain-modeler-agent
        purpose: Star schema design, KQL schemas, industry templates, synthetic data generation

  03-visualization:
    description: Semantic models and Power BI reports
    agents:
      - name: semantic-model-agent
        purpose: model.bim (TMSL), DAX measures, relationships, Direct Lake, Prep for AI
      - name: report-builder-agent
        purpose: Power BI reports, visuals, themes, pages (Legacy PBIX format only)

  04-fabric-agent:
    description: Fabric Data Agents — creation, instructions, evaluation, grading
    agents:
      - name: ai-skills-agent
        purpose: Data Agent creation, REST API, instructions, data bindings, few-shot examples
      - name: ai-skills-analysis-agent
        purpose: Data Agent evaluation, DAX quality scoring (24 BPA rules), RCA classification

  05-real-time-intelligence:
    description: EventStreams, Eventhouse, KQL dashboards
    agents:
      - name: rti-kusto-agent
        purpose: Eventhouse, KQL databases, KQL dashboards, Operations Agent
      - name: rti-eventstream-agent
        purpose: EventStreams, real-time ingestion, CDC patterns, source routing
      - name: data-activator-agent
        purpose: Data Activator (Reflex) — real-time alerts/triggers, AttributeTrigger/EventTrigger rules, Teams/Email/Fabric item actions

  06-iq:
    description: Intelligence — Ontology (semantic layer) and Graph (traversal engine), GQL, entity reasoning
    agents:
      - name: ontology-agent
        purpose: Entity types, properties, data bindings, relationships, contextualizations, NL2Ontology, Ontology MCP server (preview) — the business/semantic layer (generates a Graph Model, owned by graph-agent)
      - name: graph-agent
        purpose: Graph in Microsoft Fabric — Graph Model definition (graphType/dataSources/graphDefinition), GQL (ISO/IEC 39075), graph algorithms, Graph Query Sets, RefreshGraph, Execute Query API, NL2GQL Data Agents, standalone + ontology-backed graphs, empty-graph-after-API fix

  07-fabric-quality:
    description: Fabric-specific report validation
    agents:
      - name: pixel-design-agent
        purpose: Pre-deployment report validation — layout bounds, overlaps, font sizing

  08-migration:
    description: Platform migration to Fabric — BI (BusinessObjects) and data platforms (Databricks, Synapse)
    agents:
      - name: migration-bo-agent
        purpose: BusinessObjects → Fabric migration — 5-stage framework, 119 BO→DAX mappings
      - name: migration-databricks-agent
        purpose: Databricks → Fabric migration — dbutils→notebookutils, Unity Catalog→Lakehouse schemas, DBFS→OneLake, Jobs→SJD, MLflow, Delta Sharing
      - name: migration-synapse-agent
        purpose: Synapse → Fabric migration — phased (Spark Pools/Lake DB/Notebooks/SJD), mssparkutils→notebookutils, Linked Services→Connections/Shortcuts, SQL Pool→Warehouse

  09-app-platform:
    description: Application backends running inside Fabric (Rayfin BaaS, Replit × Fabric)
    agents:
      - name: fabric-apps-agent
        purpose: Fabric Apps (preview) via Rayfin — scaffold/model/deploy app backends (DB, Entra auth, Data APIs, hosting), data in OneLake; Replit × Fabric vibe-coding path

# Boundary clarifications:
# - cicd-fabric vs fabric-cli: cicd owns Git+pipelines+stages; cli owns fab commands+job execution
# - cicd-fabric vs workspace-admin: admin creates pipelines (REST POST); cicd manages pipeline stages
# - ontology vs rti-kusto: ontology owns entity types+GQL; rti-kusto owns KQL DB+dashboards
# - ontology vs graph: ontology owns the SEMANTIC layer (entity types, bindings, relationships, NL2Ontology, MCP server) + generates the Graph Model; graph owns the Graph Model item itself (definition, GQL, algorithms, RefreshGraph, Execute Query, NL2GQL, standalone graphs, empty-graph-after-API fix)
# - data-activator vs rti-eventstream: activator owns Reflex rules/alerts/actions; eventstream owns ingestion topology (create Eventstream w/ Activator destination first, then wire the rule)
# - data-activator vs monitoring: activator owns real-time business alerts (Reflex); monitoring owns admin/capacity/audit operational dashboards
# - orchestrator vs lakehouse: orchestrator owns scheduling+pipelines; lakehouse owns table ops+optimization
# - pixel-design (Fabric-Brain) vs testing-agent (Meta-Brain): pixel owns visual-specific layout rules for Fabric reports; testing owns generic pytest framework
# - migration-databricks/synapse vs lakehouse/orchestrator: migration agents own source-to-Fabric translation + mapping; lakehouse/orchestrator own the actual item creation (handoff target)
# - migration-bo vs migration-databricks/synapse: bo owns BI/report migration (BO→DAX); databricks/synapse own data-engineering migration (Spark/SQL/catalog)
# - fabric-apps vs extensibility-toolkit: fabric-apps owns app BACKENDS (Rayfin: DB+auth+APIs+hosting, data in OneLake); extensibility-toolkit owns custom WORKLOADS (iFrame SDK, React components, Workload Hub)
