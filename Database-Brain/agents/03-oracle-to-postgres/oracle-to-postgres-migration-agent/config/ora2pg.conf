# =========================================================================
# ora2pg.conf — Oracle 21c XE HR schema → PostgreSQL Flexible Server
# Reference: https://ora2pg.darold.net/documentation.html (Ora2Pg >= 25.0)
# Env vars expected: ORACLE_PWD, PG_PWD
# =========================================================================

# ---- ORACLE SOURCE ----
ORACLE_HOME             /opt/oracle/product/21c/dbhomeXE
ORACLE_DSN              dbi:Oracle:host=__ORACLE_FQDN__;port=1521;service_name=XEPDB1
ORACLE_USER             ora2pg_user
ORACLE_PWD              __ORACLE_PWD__
USER_GRANTS             1

# ---- POSTGRES TARGET ----
PG_DSN                  dbi:Pg:dbname=oracle_migration;host=__PG_FQDN__;port=5432;sslmode=require
PG_USER                 migration_user
PG_PWD                  __PG_PWD__
PG_VERSION              16

# ---- SCHEMA (one per config — duplicate for SH, OE) ----
SCHEMA                  HR
EXPORT_SCHEMA           1
PG_SCHEMA               hr

# ---- TYPE MAPPING ----
PG_NUMERIC_TYPE         1
PG_INTEGER_TYPE         1
DEFAULT_NUMERIC         numeric
ENABLE_BLOB_EXPORT      1
NLS_LANG                AMERICAN_AMERICA.AL32UTF8
NLS_NCHAR               AL32UTF8

# ---- EXPORT BEHAVIOR ----
TYPE                    TABLE
JOBS                    4
DATA_LIMIT              10000
LONGREADLEN             1048576
STOP_ON_ERROR           1
DISABLE_TRIGGERS        1
TRUNCATE_TABLE          1
DROP_FKEY               1
DROP_INDEXES            1

# ---- OUTPUT ----
OUTPUT_DIR              ./out
OUTPUT                  output.sql
FILE_PER_TABLE          0
COMPILE_SCHEMA          0

# ---- ASSESSMENT (TYPE=SHOW_REPORT mode) ----
ESTIMATE_COST           1
COST_UNIT_VALUE         5
DUMP_AS_HTML            1

# ---- PL/SQL CONVERSION (TYPE=FUNCTION / TYPE=PACKAGE) ----
PLSQL_PGSQL             1
NULL_EQUAL_EMPTY        1
EMPTY_LOB_NULL          1
USE_LOB_LOCATOR         0

# ---- CONNECTIONS (DON'T MODIFY unless required by network) ----
CASE_INSENSITIVE_SEARCH 0
PRESERVE_CASE           0
USE_TABLESPACE          0
